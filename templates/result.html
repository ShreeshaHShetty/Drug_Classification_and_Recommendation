<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
</head>
<body>
    <h1>Prediction Result</h1>
    <p><strong>Condition Predicted:</strong> {{ condition }}</p>
    <h2>Top 3 Suggested Drugs:</h2>
    <ul>
        {% for drug in drugs %}
        <li>{{ drug }}</li>
        {% endfor %}
    </ul>
    <a href="/">Go back</a>
</body>
</html>
